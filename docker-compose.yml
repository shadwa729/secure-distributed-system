version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: auditdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - secure_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - secure_net

  api1:
    build: ./api
    container_name: api1
    restart: always
    environment:
      INSTANCE_NAME: api1
      MYSQL_HOST: mysql
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
      MYSQL_DATABASE: auditdb
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: mysupersecretkey
      SERVICE_TOKEN: internal-service-secret
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - secure_net

  api2:
    build: ./api
    container_name: api2
    restart: always
    environment:
      INSTANCE_NAME: api2
      MYSQL_HOST: mysql
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
      MYSQL_DATABASE: auditdb
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: mysupersecretkey
      SERVICE_TOKEN: internal-service-secret
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - secure_net

  api3:
    build: ./api
    container_name: api3
    restart: always
    environment:
      INSTANCE_NAME: api3
      MYSQL_HOST: mysql
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
      MYSQL_DATABASE: auditdb
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: mysupersecretkey
      SERVICE_TOKEN: internal-service-secret
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - secure_net

  worker:
    build: ./worker
    container_name: worker
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
      MYSQL_DATABASE: auditdb
      RABBITMQ_HOST: rabbitmq
      SERVICE_TOKEN: internal-service-secret
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - secure_net

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api1
      - api2
      - api3
    networks:
      - secure_net

volumes:
  mysql_data:

networks:
  secure_net:
    driver: bridge